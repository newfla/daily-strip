name: test

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-fmt:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt
    - name: Check Style
      run: cargo fmt --check

  cargo-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Ubuntu build dependencies
        run: sudo apt update && sudo apt install -y pkg-config libfreetype6-dev libfontconfig1-dev
      - name: Run tests
        run: cargo test

  cargo-build-egui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Ubuntu build dependencies
        run: sudo apt update && sudo apt install -y pkg-config libfreetype6-dev libfontconfig1-dev
      - name: Build
        run: cargo build --features egui_frontend --no-default-features

  cargo-build-slint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: dtolnay/rust-toolchain@stable
      - name: Ubuntu build dependencies
        run: sudo apt update && sudo apt install -y pkg-config libfreetype6-dev libfontconfig1-dev
      - name: Build
        run: cargo build
  